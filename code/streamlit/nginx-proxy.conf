worker_processes 1;
error_log /tmp/nginx-error.log warn;
pid       /tmp/nginx.pid;

events { worker_connections 64; }

http {
    access_log /tmp/nginx-access.log;
    client_max_body_size 50m;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8501;

        # ── Phoenix OTel UI ──────────────────────────────────────────
        location = /phoenix { return 301 /phoenix/; }

        location /phoenix/ {
            rewrite ^/phoenix/(.*)$ /$1 break;
            proxy_pass         http://localhost:6006;
            proxy_set_header   Host $host;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_read_timeout 300s;
            # Force uncompressed response so sub_filter can rewrite HTML
            proxy_set_header   Accept-Encoding "";

            # Rewrite root-relative asset/script paths in the HTML entry point
            sub_filter_once off;
            sub_filter_types text/html;
            sub_filter 'href="/assets'  'href="/phoenix/assets';
            sub_filter 'src="/assets'   'src="/phoenix/assets';
            sub_filter 'href="/modernizr' 'href="/phoenix/modernizr';
            sub_filter 'src="/modernizr'  'src="/phoenix/modernizr';
            sub_filter 'href="/favicon'   'href="/phoenix/favicon';
            # Fix React Router basename so it resolves routes at /phoenix/
            sub_filter 'basename: ""'     'basename: "/phoenix"';
        }

        # Phoenix static assets (rewritten by sub_filter above)
        location /phoenix/assets/ {
            rewrite ^/phoenix/(.*)$ /$1 break;
            proxy_pass         http://localhost:6006;
            proxy_set_header   Host $host;
            proxy_http_version 1.1;
        }
        location /phoenix/modernizr.js {
            rewrite ^/phoenix/(.*)$ /$1 break;
            proxy_pass         http://localhost:6006;
            proxy_set_header   Host $host;
            proxy_http_version 1.1;
        }
        location /phoenix/favicon.ico {
            rewrite ^/phoenix/(.*)$ /$1 break;
            proxy_pass         http://localhost:6006;
            proxy_set_header   Host $host;
            proxy_http_version 1.1;
        }

        # Phoenix REST API — JS fetches /v1/... directly; route to Phoenix
        location /v1/ {
            proxy_pass         http://localhost:6006;
            proxy_set_header   Host $host;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_read_timeout 300s;
        }

        # ── nsflow UI ────────────────────────────────────────────────
        location = /agents { return 301 /agents/; }

        location /agents/ {
            rewrite ^/agents/(.*)$ /$1 break;
            proxy_pass         http://localhost:4173;
            proxy_set_header   Host $host;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_read_timeout 300s;

            sub_filter_once off;
            sub_filter_types text/html;
            sub_filter 'href="/assets'  'href="/agents/assets';
            sub_filter 'src="/assets'   'src="/agents/assets';
            sub_filter 'href="/vite'    'href="/agents/vite';
            sub_filter 'src="/vite'     'src="/agents/vite';
        }

        # nsflow static assets (rewritten by sub_filter above)
        location /agents/assets/ {
            rewrite ^/agents/(.*)$ /$1 break;
            proxy_pass         http://localhost:4173;
            proxy_set_header   Host $host;
            proxy_http_version 1.1;
        }
        location /agents/vite.svg {
            rewrite ^/agents/(.*)$ /$1 break;
            proxy_pass         http://localhost:4173;
            proxy_set_header   Host $host;
            proxy_http_version 1.1;
        }

        # nsflow REST API — JS fetches /api/... directly; route to nsflow
        location /api/ {
            proxy_pass         http://localhost:4173;
            proxy_set_header   Host $host;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_read_timeout 300s;
        }

        # nsflow client-side routes — the SPA opens these as new tabs via
        # window.open("/editor?...") or window.location.href="/home", which are
        # absolute paths that bypass the /agents/ prefix. Proxy to Vite so it
        # serves index.html (SPA fallback) and React Router handles the route.
        # sub_filter rewrites asset paths so JS/CSS load correctly.
        location ~ ^/(editor|home|cruse)(/|$) {
            proxy_pass         http://localhost:4173;
            proxy_set_header   Host $host;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_read_timeout 300s;
            proxy_set_header   Accept-Encoding "";

            sub_filter_once off;
            sub_filter_types text/html;
            sub_filter 'href="/assets'  'href="/agents/assets';
            sub_filter 'src="/assets'   'src="/agents/assets';
            sub_filter 'href="/vite'    'href="/agents/vite';
            sub_filter 'src="/vite'     'src="/agents/vite';
        }

        # ── Streamlit — everything else ──────────────────────────────
        location / {
            proxy_pass         http://localhost:8502;
            proxy_set_header   Host $host;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_read_timeout 300s;
        }
    }
}
